<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=999" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=999" />
  <link rel="shortcut icon" href="/favicon.ico?v=999" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#E60000" />

  <!-- ✅ Eliminado user-scalable=no y maximum-scale=1.0 — bloqueaban el scroll en iOS -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Falla Amics de Nàquera</title>

  <!-- ✅ Estilos base globales aquí para que apliquen a toda la app -->
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #f8f9fa;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch; /* scroll suave en iOS */
    }

    #root {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* Layout compartido por todas las páginas */
    .app-layout {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      flex: 1;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
